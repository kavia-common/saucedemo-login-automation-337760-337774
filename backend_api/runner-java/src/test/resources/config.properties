# ===================================================================
# SauceDemo Login Automation Framework - Configuration
# ===================================================================
# This file provides default configuration values for the test framework.
# All properties can be overridden by:
#   1. Environment variables (dots replaced with underscores, uppercased)
#      e.g., base.url -> BASE_URL
#   2. System properties (-D flags)
#      e.g., mvn test -Dbase.url=https://www.saucedemo.com
# ===================================================================

# Base URL for the application under test
base.url=https://www.saucedemo.com

# Browser configuration
# Supported: chrome, firefox, edge (msedge)
browser.name=chrome

# Run browser in headless mode (true/false)
# Set to false for local debugging
browser.headless=true

# Implicit wait timeout in seconds
implicit.wait.seconds=2

# Explicit wait default timeout in seconds
explicit.wait.seconds=10

# Screenshot directory (relative to project root)
screenshot.dir=target/screenshots

# ===================================================================
# Edge WebDriver Configuration
# ===================================================================
# Path to the preinstalled msedgedriver binary.
# Required when browser.name=edge or browser.name=msedge.
# The msedgedriver CDN (msedgedriver.azureedge.net) may be unreachable
# in restricted/CI environments, so a preinstalled binary is used.
#
# Can be overridden by:
#   - Environment variable: WEBDRIVER_EDGE_DRIVER
#   - System property: -Dwebdriver.edge.driver=/path/to/msedgedriver
webdriver.edge.driver=/usr/local/bin/msedgedriver

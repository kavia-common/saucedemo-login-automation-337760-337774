# SLF4J Simple Logger Configuration
# See: http://www.slf4j.org/api/org/slf4j/simple/SimpleLogger.html

# Default log level for all loggers
org.slf4j.simpleLogger.defaultLogLevel=info

# Log level for framework packages
org.slf4j.simpleLogger.log.com.kavia=info

# Log level for Cucumber
org.slf4j.simpleLogger.log.io.cucumber=warn

# Log level for Selenium
org.slf4j.simpleLogger.log.org.openqa.selenium=warn

# Log level for WebDriverManager
org.slf4j.simpleLogger.log.io.github.bonigarcia=info

# Show date/time in log messages
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS

# Show thread name
org.slf4j.simpleLogger.showThreadName=true

# Show logger name (short form)
org.slf4j.simpleLogger.showShortLogName=true
